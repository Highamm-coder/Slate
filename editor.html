<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Slate — Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- GrapesJS core -->
<link rel="stylesheet" href="https://unpkg.com/grapesjs@0.21.13/dist/css/grapes.min.css">
<script src="https://unpkg.com/grapesjs@0.21.13/dist/grapes.min.js"></script>
<style>
  :root{
    --ed-bg:#1A1C2E;
    --ed-panel:#141626;
    --ed-border:#2A2C40;
    --ed-text:#E8E7E3;
    --ed-muted:#8A8BA0;
    --ed-accent:#3D3FB7;
    --ed-accent-hover:#5254D4;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;background:var(--ed-bg);font-family:'Inter',system-ui,sans-serif;color:var(--ed-text);}

  /* --- TOP BAR ------------------------------------------------------- */
  .ed-topbar{
    height:48px;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 16px;
    background:var(--ed-panel);
    border-bottom:1px solid var(--ed-border);
    z-index:10;
  }
  .ed-topbar-left{display:flex;align-items:center;gap:12px;}
  .ed-topbar-left .dot{width:5px;height:5px;border-radius:50%;background:var(--ed-accent);}
  .ed-topbar-left .brand{font-size:12px;font-weight:600;letter-spacing:.06em;}
  .ed-topbar-left .sep{color:var(--ed-muted);font-size:11px;}
  .ed-topbar-left .page{font-size:12px;font-weight:400;color:var(--ed-muted);letter-spacing:.02em;}
  .ed-topbar-right{display:flex;align-items:center;gap:6px;}
  .ed-btn{
    padding:6px 14px;border:none;border-radius:3px;
    font-family:'Inter',sans-serif;font-size:11px;font-weight:500;
    letter-spacing:.03em;cursor:pointer;
    transition:background .15s ease,transform .1s ease;
  }
  .ed-btn:active{transform:scale(.97);}
  .ed-btn.primary{background:var(--ed-accent);color:#fff;}
  .ed-btn.primary:hover{background:var(--ed-accent-hover);}
  .ed-btn.ghost{background:rgba(255,255,255,0.06);color:var(--ed-text);border:1px solid var(--ed-border);}
  .ed-btn.ghost:hover{background:rgba(255,255,255,0.10);}

  /* --- EMPTY STATE --------------------------------------------------- */
  .ed-empty{
    position:absolute;inset:48px 0 0 0;
    display:flex;align-items:center;justify-content:center;
    z-index:5;background:var(--ed-bg);
  }
  .ed-empty.hidden{display:none;}
  .ed-empty-card{text-align:center;max-width:440px;}
  .ed-empty-card .eyebrow{
    font-size:10px;font-weight:500;letter-spacing:.22em;
    text-transform:uppercase;color:var(--ed-accent);margin-bottom:16px;
  }
  .ed-empty-card h2{font-size:28px;font-weight:600;letter-spacing:-.02em;margin-bottom:10px;}
  .ed-empty-card p{font-size:13px;line-height:1.6;color:var(--ed-muted);margin-bottom:24px;}
  .ed-empty-card .actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}

  /* --- GrapesJS overrides ------------------------------------------- */
  /* Make the GrapesJS chrome match the dark Slate aesthetic */
  .gjs-one-bg{background:var(--ed-panel) !important;}
  .gjs-two-color{color:var(--ed-text) !important;}
  .gjs-three-bg{background:var(--ed-bg) !important;}
  .gjs-four-color,.gjs-four-color-h:hover{color:var(--ed-accent) !important;}
  .gjs-pn-panel{background:var(--ed-panel) !important;border-color:var(--ed-border) !important;}
  .gjs-pn-views,.gjs-pn-views-container{background:var(--ed-panel) !important;}
  .gjs-block{
    background:rgba(255,255,255,0.04) !important;
    border:1px solid var(--ed-border) !important;
    border-radius:4px !important;
    color:var(--ed-text) !important;
    font-family:'Inter',sans-serif !important;
    font-size:11px !important;
    min-height:auto !important;
    padding:10px 8px !important;
  }
  .gjs-block:hover{background:rgba(255,255,255,0.08) !important;border-color:var(--ed-accent) !important;}
  .gjs-block__media{display:none !important;}
  .gjs-block-label{font-size:11px !important;font-weight:500 !important;letter-spacing:.02em !important;}
  .gjs-cv-canvas{background:var(--ed-bg) !important;}
  .gjs-frame-wrapper{overflow-y:auto !important;}
  .gjs-pn-btn{color:var(--ed-muted) !important;}
  .gjs-pn-btn.gjs-pn-active,.gjs-pn-btn:hover{color:var(--ed-accent) !important;}
  .gjs-sm-sector-title,.gjs-sm-label,.gjs-trt-trait .gjs-label{
    font-family:'Inter',sans-serif !important;
    font-size:11px !important;
    color:var(--ed-muted) !important;
    letter-spacing:.02em !important;
  }
  .gjs-field{
    background:rgba(255,255,255,0.04) !important;
    border-color:var(--ed-border) !important;
    color:var(--ed-text) !important;
    font-family:'Inter',sans-serif !important;
    font-size:12px !important;
  }
  .gjs-input-holder input,.gjs-field input,.gjs-field textarea,.gjs-field select{
    color:var(--ed-text) !important;
    font-family:'Inter',sans-serif !important;
  }
  .gjs-clm-tags .gjs-sm-title,.gjs-clm-sels-info,.gjs-clm-label{display:none !important;}
  /* Hide layer manager and code view from panels — keep blocks + traits only */
  .gjs-pn-options .gjs-pn-btn[title="Open Code"],
  .gjs-pn-options .gjs-pn-btn[title="Fullscreen"]{display:none !important;}

  /* --- TOAST --------------------------------------------------------- */
  .ed-toast{
    position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-8px);
    background:var(--ed-accent);color:#fff;
    padding:8px 16px;border-radius:3px;
    font-size:11px;font-weight:500;letter-spacing:.04em;
    opacity:0;pointer-events:none;z-index:100;
    transition:opacity .2s ease,transform .2s ease;
  }
  .ed-toast.visible{opacity:1;transform:translateX(-50%) translateY(0);}

  /* --- LAYOUT -------------------------------------------------------- */
  #gjs{
    height:calc(100vh - 48px);
    width:100%;
    display:none;
  }
  #gjs.active{display:block;}
</style>
</head>
<body>

<!-- Top bar -->
<div class="ed-topbar">
  <div class="ed-topbar-left">
    <span class="dot"></span>
    <span class="brand">SLATE</span>
    <span class="sep">/</span>
    <span class="page" id="ed-title">Editor</span>
  </div>
  <div class="ed-topbar-right">
    <button class="ed-btn ghost" id="btn-copy-html" title="Copy HTML to clipboard">Copy HTML</button>
    <button class="ed-btn ghost" id="btn-viewer" title="Open in Slate Viewer">Open in Viewer</button>
    <button class="ed-btn primary" id="btn-download">Download</button>
  </div>
</div>

<!-- Empty state (before a slate is loaded) -->
<div class="ed-empty" id="ed-empty">
  <div class="ed-empty-card">
    <div class="eyebrow">Editor</div>
    <h2>Edit a slate.</h2>
    <p>Drop a slate HTML file here — or start from the template. You'll be able to edit copy, change the accent colour, and reorder slides visually.</p>
    <div class="actions">
      <button class="ed-btn primary" id="btn-load-template">Start from template</button>
      <button class="ed-btn ghost" id="btn-pick-file">Open a slate file</button>
    </div>
  </div>
  <input type="file" id="file-input" accept=".html,.htm" style="display:none;">
</div>

<!-- GrapesJS container -->
<div id="gjs"></div>

<div class="ed-toast" id="ed-toast"></div>

<script>
(function(){
  const emptyEl    = document.getElementById('ed-empty');
  const gjsEl      = document.getElementById('gjs');
  const titleEl    = document.getElementById('ed-title');
  const toastEl    = document.getElementById('ed-toast');
  const fileInput  = document.getElementById('file-input');
  const btnTemplate= document.getElementById('btn-load-template');
  const btnPick    = document.getElementById('btn-pick-file');
  const btnCopy    = document.getElementById('btn-copy-html');
  const btnViewer  = document.getElementById('btn-viewer');
  const btnDownload= document.getElementById('btn-download');

  let editor = null;
  let currentFilename = 'slate.html';

  // --- Toast --------------------------------------------------------
  let toastTimer;
  const toast = (msg) => {
    toastEl.textContent = msg;
    toastEl.classList.add('visible');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('visible'), 2000);
  };

  // --- Extract slate content from a full HTML document ---------------
  // We pull out the CSS (<style>/<link>) and the slide markup so
  // GrapesJS can render it in its iframe canvas.
  const parseSlateHTML = (html) => {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const title = doc.querySelector('title')?.textContent?.trim() || 'Untitled Slate';

    // Collect all <style> contents
    let css = '';
    doc.querySelectorAll('style').forEach(s => { css += s.textContent + '\n'; });

    // Collect <link rel="stylesheet"> hrefs
    const links = [];
    doc.querySelectorAll('link[rel="stylesheet"]').forEach(l => {
      if (l.href) links.push(l.getAttribute('href'));
    });

    // Grab inner body HTML
    const bodyHTML = doc.body ? doc.body.innerHTML : html;

    return { title, css, links, bodyHTML, fullHTML: html };
  };

  // --- Reassemble a full HTML document from GrapesJS state -----------
  const getFullHTML = () => {
    if (!editor) return '';
    const html = editor.getHtml();
    const css = editor.getCss({ avoidProtected: true });

    // Get the link tags from GrapesJS canvas head
    const canvasDoc = editor.Canvas.getDocument();
    let linkTags = '';
    if (canvasDoc) {
      canvasDoc.querySelectorAll('link[rel="stylesheet"]').forEach(l => {
        linkTags += l.outerHTML + '\n';
      });
    }

    const title = titleEl.textContent || 'Slate';
    return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>${title}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
${linkTags}<style>
${css}
</style>
</head>
<body>
${html}
</body>
</html>`;
  };

  // --- Initialize GrapesJS ------------------------------------------
  const initEditor = (parsed) => {
    titleEl.textContent = parsed.title;
    emptyEl.classList.add('hidden');
    gjsEl.classList.add('active');

    // Build canvas head styles: Google Fonts + slate's own CSS
    const canvasStyles = [
      'https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap',
      ...parsed.links,
    ];

    editor = grapesjs.init({
      container: '#gjs',
      fromElement: false,
      height: '100%',
      width: 'auto',
      storageManager: false,  // no auto-save — explicit export

      canvas: {
        styles: canvasStyles,
      },

      // Don't include default blocks — we only want Slate blocks
      plugins: [],
      pluginsOpts: {},

      // Panels: keep blocks + traits, hide layers + code
      panels: { defaults: [] },

      // Style manager: locked to accent colour only
      styleManager: { sectors: [] },

      // Trait manager: expose useful per-component traits
      traitManager: {},

      // Device manager: just the default 16:9-ish desktop
      deviceManager: {
        devices: [
          { name: 'Desktop', width: '' },
        ],
      },
    });

    // Inject the slate's CSS into the canvas
    if (parsed.css) {
      const canvasHead = editor.Canvas.getDocument()?.head;
      if (canvasHead) {
        const styleEl = document.createElement('style');
        styleEl.textContent = parsed.css;
        canvasHead.appendChild(styleEl);
      }
    }

    // Load the body HTML
    editor.setComponents(parsed.bodyHTML);

    // Add the slate CSS as a static stylesheet so getCss() includes it
    editor.setStyle(parsed.css);

    // --- Add Slate slide blocks to the block manager ----------------
    const bm = editor.BlockManager;

    const slideTypes = {
      'Title Slide': `<section class="slide title has-bg dark"><div class="bg"></div><div class="inner"><div class="eyebrow">PRESENTATION · 2026</div><div class="title-block" style="margin-top:auto;"><h1 class="h1">Your headline here.</h1><p class="sub">A one-sentence subtitle.</p></div><div class="chrome"><div class="mark"><span class="dot"></span><span>STUDIO</span></div><span>00 / 00</span></div></div></section>`,
      'Agenda': `<section class="slide"><div class="inner"><div class="meta-row"><span class="eyebrow">Agenda</span><span class="sec">Section 01</span></div><h2 class="h2">What we'll cover.</h2><div class="agenda-grid"><div class="agenda-item"><div class="num">01</div><div><div class="ttl">Section title</div><div class="sub">One-line description.</div></div></div><div class="agenda-item"><div class="num">02</div><div><div class="ttl">Section title</div><div class="sub">One-line description.</div></div></div></div><div class="chrome"><div class="mark"><span class="dot"></span><span>STUDIO</span></div><span>00 / 00</span></div></div></section>`,
      'Statement': `<section class="slide has-bg dark"><div class="bg"></div><div class="inner"><div class="meta-row"><span class="eyebrow">The premise</span><span class="sec">Section 02</span></div><p class="statement">A single confident sentence that establishes the premise.</p><div class="chrome"><div class="mark"><span class="dot"></span><span>STUDIO</span></div><span>00 / 00</span></div></div></section>`,
      'Two Column': `<section class="slide"><div class="inner"><div class="meta-row"><span class="eyebrow">Context</span><span class="sec">Section 02</span></div><h2 class="h2">Two forces at play.</h2><div class="cols"><div class="col"><h3>First column</h3><p>Body text here.</p></div><div class="col"><h3>Second column</h3><p>Body text here.</p></div></div><div class="chrome"><div class="mark"><span class="dot"></span><span>STUDIO</span></div><span>00 / 00</span></div></div></section>`,
      'Stats': `<section class="slide"><div class="inner"><div class="meta-row"><span class="eyebrow">By the numbers</span><span class="sec">Section 03</span></div><h2 class="h2">The case, in three figures.</h2><div class="stats"><div class="stat"><div class="num mono">3.2×</div><div class="lbl">Label</div><div class="desc">Description.</div></div><div class="stat"><div class="num mono">41%</div><div class="lbl">Label</div><div class="desc">Description.</div></div><div class="stat"><div class="num mono">$1.8M</div><div class="lbl">Label</div><div class="desc">Description.</div></div></div><div class="chrome"><div class="mark"><span class="dot"></span><span>STUDIO</span></div><span>00 / 00</span></div></div></section>`,
      'Principles': `<section class="slide dark"><div class="inner"><div class="meta-row"><span class="eyebrow">Approach</span><span class="sec">Section 03</span></div><h2 class="h2" style="color:#F2F1EC;">Three principles.</h2><div class="plist"><div class="prow"><div class="idx">P · 01</div><div class="h">Principle one</div><div class="d">One sentence of elaboration.</div></div><div class="prow"><div class="idx">P · 02</div><div class="h">Principle two</div><div class="d">One sentence of elaboration.</div></div><div class="prow"><div class="idx">P · 03</div><div class="h">Principle three</div><div class="d">One sentence of elaboration.</div></div></div><div class="chrome"><div class="mark"><span class="dot"></span><span>STUDIO</span></div><span>00 / 00</span></div></div></section>`,
      'Quote': `<section class="slide"><div class="inner"><div class="meta-row"><span class="eyebrow">In their words</span><span class="sec">Section 04</span></div><div class="quote"><span class="mark-q">"</span><p class="q">A memorable quote from a credible source.</p><p class="attr">Name · Role · Organisation</p></div><div class="chrome"><div class="mark"><span class="dot"></span><span>STUDIO</span></div><span>00 / 00</span></div></div></section>`,
      'Close': `<section class="slide has-bg dark"><div class="bg"></div><div class="inner"><div class="meta-row"><span class="eyebrow">Next</span><span class="sec">Close</span></div><h2 class="h2" style="color:#FFFFFF;">Let's put this into motion.</h2><p class="body" style="max-width:60%;margin-top:1.4cqw;color:rgba(242,241,236,0.78);">A short call to action.</p><div class="close-layout"><a href="#" class="cta">CTA label  →</a><div class="contact"><strong>Your Name</strong><span>email@domain.com</span></div></div><div class="chrome"><div class="mark"><span class="dot"></span><span>STUDIO</span></div><span>00 / 00</span></div></div></section>`,
    };

    Object.entries(slideTypes).forEach(([label, content]) => {
      bm.add(`slate-${label.toLowerCase().replace(/\s/g, '-')}`, {
        label,
        category: 'Slides',
        content,
        activate: true,
      });
    });

    // Open the blocks panel by default
    const pn = editor.Panels;
    pn.addPanel({ id: 'views', buttons: [
      { id: 'open-blocks', active: true, label: 'Slides', command: 'open-blocks', togglable: false },
    ]});

    // Make text elements directly editable on double-click
    editor.on('component:selected', (model) => {
      // Allow text editing on any element that contains text
      if (model.get('type') !== 'wrapper' && model.get('type') !== 'image') {
        model.set('editable', true);
      }
    });

    // Auto-scroll the canvas to the bottom when a new block is dropped
    // (since slides stack vertically)
    editor.on('block:drag:stop', (component) => {
      if (component) {
        const el = component.getEl();
        if (el) setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'center' }), 200);
      }
    });
  };

  // --- Load a slate file --------------------------------------------
  const loadFromFile = (file) => {
    currentFilename = file.name;
    const reader = new FileReader();
    reader.onload = (e) => {
      const parsed = parseSlateHTML(e.target.result);
      initEditor(parsed);
    };
    reader.readAsText(file);
  };

  const loadFromURL = async (url) => {
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const html = await res.text();
      currentFilename = url.split('/').pop() || 'slate.html';
      const parsed = parseSlateHTML(html);
      initEditor(parsed);
    } catch (err) {
      toast('Failed to load: ' + err.message);
    }
  };

  // --- Empty state actions ------------------------------------------
  btnTemplate.addEventListener('click', () => loadFromURL('template.html'));
  btnPick.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) loadFromFile(fileInput.files[0]);
  });

  // Drag and drop onto empty state
  ['dragenter','dragover'].forEach(ev => {
    emptyEl.addEventListener(ev, (e) => { e.preventDefault(); e.stopPropagation(); });
  });
  emptyEl.addEventListener('drop', (e) => {
    e.preventDefault(); e.stopPropagation();
    const file = e.dataTransfer.files[0];
    if (file) loadFromFile(file);
  });

  // --- Export buttons ------------------------------------------------
  btnDownload.addEventListener('click', () => {
    if (!editor) return;
    const html = getFullHTML();
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = currentFilename;
    a.click();
    URL.revokeObjectURL(url);
    toast('Downloaded ' + currentFilename);
  });

  btnCopy.addEventListener('click', async () => {
    if (!editor) return;
    try {
      await navigator.clipboard.writeText(getFullHTML());
      toast('HTML copied to clipboard');
    } catch {
      toast('Copy failed — try Download instead');
    }
  });

  btnViewer.addEventListener('click', () => {
    if (!editor) return;
    const html = getFullHTML();
    // Store in sessionStorage and open the viewer
    try {
      sessionStorage.setItem('slate-editor-handoff', html);
      window.open('index.html?from=editor', '_blank');
    } catch {
      toast('Slate too large for handoff — use Download');
    }
  });

  // --- URL param auto-load ------------------------------------------
  const params = new URLSearchParams(location.search);
  const slateParam = params.get('slate') || params.get('deck');
  if (slateParam) loadFromURL(slateParam);
})();
</script>
</body>
</html>
